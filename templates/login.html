<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Brick Scanner — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <meta name="theme-color" content="#0A0E12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --yellow:#3B9EFF; --bg:#0C1014; --surface:#141A22; --surface3:#232E3D;
      --socket:#080B0F; --border:rgba(150,180,215,.10); --border-bright:rgba(150,180,215,.20);
      --text:#EAEEF4; --muted:#9EAAB9; --red:#F0564B;
      --font-body:'Inter',system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      background:var(--bg); color:var(--text); font-family:var(--font-body);
      display:flex; align-items:center; justify-content:center; padding:24px;
      -webkit-font-smoothing:antialiased;
    }
    .card{
      width:100%; max-width:340px; background:var(--surface);
      border:1px solid var(--border); border-radius:18px; padding:28px 24px 24px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }
    .logo{display:flex; align-items:center; gap:10px; margin-bottom:22px}
    .logo img{width:34px; height:34px}
    .logo h1{font-size:17px; font-weight:600; margin:0; letter-spacing:-.01em}
    label{display:block; font-size:12px; color:var(--muted); margin:0 0 7px 2px; font-weight:500}
    input[type=password]{
      width:100%; padding:13px 14px; font-size:16px; font-family:var(--font-body);
      color:var(--text); background:var(--socket);
      border:1px solid var(--border-bright); border-radius:11px; outline:none;
    }
    input[type=password]:focus{border-color:var(--yellow)}
    button{
      width:100%; margin-top:16px; padding:13px; font-size:15px; font-weight:600;
      font-family:var(--font-body); color:#06121F; background:var(--yellow);
      border:none; border-radius:11px; cursor:pointer;
    }
    button:active{opacity:.85}
    .error{
      margin:14px 0 0; padding:10px 12px; font-size:13px; color:#FFD8D4;
      background:rgba(240,86,75,.12); border:1px solid rgba(240,86,75,.3); border-radius:10px;
    }
    .passkey-btn{
      display:none; width:100%; margin-top:12px; padding:13px;
      font-size:15px; font-weight:600; font-family:var(--font-body);
      color:var(--text); background:var(--surface3);
      border:1px solid var(--border-bright); border-radius:11px; cursor:pointer;
      align-items:center; justify-content:center; gap:8px;
    }
    .passkey-btn svg{width:18px;height:18px;fill:none;stroke:var(--yellow);stroke-width:2}
    .divider{display:none;align-items:center;gap:10px;margin:16px 0 4px;color:var(--muted);font-size:11px}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  </style>
</head>
<body>
  <form class="card" method="POST" action="/login{{ ('?next=' + request.args.get('next')) if request.args.get('next') else '' }}">
    <div class="logo">
      <img src="/static/app-icon.svg" alt="">
      <h1>Brick Scanner</h1>
    </div>
    <button type="button" class="passkey-btn" id="passkeyBtn" onclick="signInWithPasskey()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="9" r="4"/><path d="M9 13c-3 0-5 1.8-5 4v1h7"/><path d="M14.5 13.5l4 4M17 13a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
      Sign in with Face ID
    </button>
    <div class="divider" id="pkDivider">or use password</div>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <p class="error" id="pkError" style="display:none"></p>
  </form>
  <script>
    function b64urlToBuf(s){s=s.replace(/-/g,'+').replace(/_/g,'/');s+='='.repeat((4-s.length%4)%4);const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u.buffer;}
    function bufToB64url(buf){const u=new Uint8Array(buf);let s='';for(const b of u)s+=String.fromCharCode(b);return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
    const NEXT = new URLSearchParams(location.search).get('next') || '/';

    // Show the passkey button only if WebAuthn is available and one is registered.
    (async function(){
      if(!window.PublicKeyCredential) return;
      try{
        const s = await fetch('/api/passkey/registered').then(r=>r.json());
        if(s.enabled && s.has_passkey){
          document.getElementById('passkeyBtn').style.display='flex';
          document.getElementById('pkDivider').style.display='flex';
        }
      }catch(e){}
    })();

    async function signInWithPasskey(){
      const errEl = document.getElementById('pkError');
      errEl.style.display='none';
      try{
        const opts = await fetch('/api/passkey/auth/begin',{method:'POST'}).then(r=>r.json());
        opts.challenge = b64urlToBuf(opts.challenge);
        (opts.allowCredentials||[]).forEach(c=>c.id=b64urlToBuf(c.id));
        const a = await navigator.credentials.get({publicKey:opts});
        const body = {
          id:a.id, rawId:bufToB64url(a.rawId), type:a.type,
          response:{
            clientDataJSON:bufToB64url(a.response.clientDataJSON),
            authenticatorData:bufToB64url(a.response.authenticatorData),
            signature:bufToB64url(a.response.signature),
            userHandle:a.response.userHandle?bufToB64url(a.response.userHandle):null,
          },
          clientExtensionResults:a.getClientExtensionResults(),
          authenticatorAttachment:a.authenticatorAttachment,
        };
        const res = await fetch('/api/passkey/auth/complete',{method:'POST',
          headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(res.ok){ location.href = NEXT.startsWith('/')?NEXT:'/'; return; }
        throw new Error((await res.json()).error||'Sign-in failed');
      }catch(e){
        if(e.name==='NotAllowedError') return;   // user cancelled Face ID
        errEl.textContent = 'Face ID sign-in failed — use your password.';
        errEl.style.display='block';
      }
    }
  </script>
</body>
</html>
